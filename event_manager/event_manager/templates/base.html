<!DOCTYPE html>
{% load i18n %}
{% load static %}
{% get_current_language as LANGUAGE_CODE %}
<html lang='{{ LANGUAGE_CODE }}' class="h-100">
<head>
  <meta charset="utf-8">
  <title>{% block title %}{% endblock %}</title>
  <meta name="author" content="{% block author %}{% endblock %}">
  <meta name="description" content="{% block description %}{% endblock %}">
  <meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
<link href="{% static 'css/style.css' %}" rel="stylesheet" />

<style>
main>.container {
  padding: 20px 25px 0;
}

.event_box a {
  text-decoration: none;
}

.event_box li {
  margin-bottom: 15px;
}

ul {
  padding-left: 0px;
  list-style-type: none;
  margin-left: 0px;
}

ul li a {
  text-decoration: none;
}

.card a {
  text-decoration: none;
}

.card h3,
.card p {
  color: #333;
}
</style>

</head>

<body class="d-flex flex-column h-100">


<header class="p-3 bg-dark text-white">

    <div class="container">
      <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
  
        <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0" style="margin-left:120px;">

          <li><a href="" class="nav-link px-2
                  text-white">Events</a></li>

          <li><a href="{% url 'events:categories' %}" class="nav-link px-2
                  text-white">Kategorien</a></li>
        </ul>

        <div class="text-end">

          
        </div>
      </div>
    </div>
</header>

<main class="flex-shrink-0">

<div class="container">
<div class="row">
    <div class="col-12" style="margin-top:25px;">
    {% block head %}{% endblock %}
    </div>
</div>
</div>

<div class="container">
<div class="row">
  {% block content %}{% endblock %}
</div>
</div>

</main>


<footer class="footer mt-auto py-3 text-light bg-dark">
  <div class="container">
    <p class="float-end mb-1">
      <a href="#">Back to top</a>
    </p>
    <h3 class="mb-1">Event Manager</h3>
    <p class="mb-0">Neu in Django? <a href="/">Visit the Pingu homepage</a>
    oder <a href="https://djangoheroes.friendlybytes.net">Leg los mit Django</a>.</p>
  </div>
</footer>

<!-- JavaScript Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>

</html>
